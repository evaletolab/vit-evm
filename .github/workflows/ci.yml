name: CI

on:
  pull_request:
  push:
    branches: [main, max-ux-2026]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: Install rollup linux binary (npm optional deps bug 4828)
        run: npm install --no-save @rollup/rollup-linux-x64-gnu@4.46.2

      - name: Build vit-core
        run: npm run build --workspace=packages/vit-core --if-present

      - name: Build vit-pay-app
        run: npm run build --workspace=packages/vit-pay-app

      - name: Test vit-core
        run: npm test --workspace=packages/vit-core

      - name: Test vit-pay-app
        run: npm test --workspace=packages/vit-pay-app

      - name: Test vit-safe-modules (Solidity, debt — non-blocking)
        run: npm test --workspace=packages/vit-safe-modules
        continue-on-error: true

      - name: npm audit (high+)
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true
