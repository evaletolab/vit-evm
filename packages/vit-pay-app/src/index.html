<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://accounts.google.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' data: https://fonts.gstatic.com;
    img-src 'self' data: blob:;
    connect-src 'self' https: wss:;
    frame-src 'self' https://accounts.google.com;
    form-action 'self';
    base-uri 'self';
    object-src 'none';
  ">
  <title>ViTpay</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0066ff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ViTpay">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    (function() {
      if (!('serviceWorker' in navigator)) return;
      var hashPattern = /\.[a-f0-9]{8,}\.(js|css|mjs)$/i;
      var recovering = false;
      function fullReset() {
        navigator.serviceWorker.getRegistrations()
          .then(function(regs) { return Promise.all(regs.map(function(r) { return r.unregister(); })); })
          .then(function() { return caches.keys(); })
          .then(function(names) { return Promise.all(names.map(function(n) { return caches.delete(n); })); })
          .then(function() { window.location.reload(); })
          .catch(function() { window.location.reload(); });
      }
      window.addEventListener('error', function(event) {
        if (recovering) return;
        var t = event.target;
        var src = t && (t.src || t.href);
        if (src && hashPattern.test(src)) { recovering = true; fullReset(); }
      }, true);
      navigator.serviceWorker.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'UNRECOVERABLE_STATE' && !recovering) {
          recovering = true; fullReset();
        }
      });
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
